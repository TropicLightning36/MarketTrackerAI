<!DOCTYPE html>
<html>
<head>
<title>MarketTrackerAI</title>
</head>

<body style="font-family:Arial; text-align:center; margin-top:100px;">

<h1>MarketTrackerAI</h1>

<input id="stock" placeholder="Enter stock ticker (AAPL)">
<button onclick="search()">Search</button>

<p id="result"></p>

<script>
async function search(){

let ticker = document.getElementById("stock").value;

let response = await fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=YOUR_API_KEY`);
let data = await response.json();

document.getElementById("result").innerHTML =
`Current Price: $${data.c}<br>
High Today: $${data.h}<br>
Low Today: $${data.l}`;

}
</script>

</body>
</html>
